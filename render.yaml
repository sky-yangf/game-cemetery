services:
  - type: web
    name: game-cemetery-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: "https://game-cemetery.vercel.app,http://localhost:5173"
      # 可选: 接 Turso 持久化 (推荐; 否则重启丢数据)
      # - key: DATABASE_URL
      #   value: "libsql://your-db.turso.io"
      # - key: DATABASE_AUTH_TOKEN
      #   value: "your-turso-token"
    autoDeploy: true
